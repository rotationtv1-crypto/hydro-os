name = "hydro-os"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
SERVICE_NAME = "Hydro-OS"
PILLAR_NUMBER = "7"

# Secrets (set via: npx wrangler secret put <KEY>)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_KEY
# WEBHOOK_SECRET

[observability]
enabled = true
head_sampling_rate = 1
